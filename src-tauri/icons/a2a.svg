<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" stroke="#E5E7EB" stroke-width="8"/>
  
  <!-- 主图形：抽象的A2A连接概念 -->
  <g transform="translate(128, 128)">
    <!-- 左侧节点 -->
    <circle cx="64" cy="128" r="32" fill="#3B82F6" opacity="0.9"/>
    <circle cx="64" cy="128" r="24" fill="#60A5FA"/>
    
    <!-- 右侧节点 -->
    <circle cx="192" cy="128" r="32" fill="#10B981" opacity="0.9"/>
    <circle cx="192" cy="128" r="24" fill="#34D399"/>
    
    <!-- 连接线 -->
    <path d="M 96 128 L 160 128" stroke="#6B7280" stroke-width="6" stroke-linecap="round"/>
    
    <!-- 数据流动效果 -->
    <circle cx="128" cy="128" r="8" fill="#F59E0B">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- 装饰性元素 -->
    <circle cx="64" cy="96" r="4" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="192" cy="96" r="4" fill="#EF4444" opacity="0.6"/>
    <circle cx="64" cy="160" r="4" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="192" cy="160" r="4" fill="#EF4444" opacity="0.6"/>
  </g>
  
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>